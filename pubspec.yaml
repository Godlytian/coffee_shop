name: coffee_shop
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.12.0
  provider: ^6.1.5
  flutter_slidable: ^4.0.3
  blue_thermal_printer: ^1.2.3
  shared_preferences: ^2.5.4
  permission_handler: ^12.0.1
  flutter_dotenv: ^5.1.0
  uuid: ^4.5.1
  connectivity_plus: ^6.1.1
  sqflite: ^2.4.1
  path: ^1.9.1
  workmanager: ^0.9.0
  url_launcher: ^6.3.1
  app_badger: ^0.0.2
  audioplayers: ^6.6.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^20.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/ulun.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/sounds/order_alert.wav
